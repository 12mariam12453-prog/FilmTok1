/* =======================
   RECOMMENDATION LOGIC
======================= */

const getFavorites = () => {
  return JSON.parse(localStorage.getItem("favorites")) || [];
}; /* this is a helper function to get the favorites list from local storage. it returns an empty array if there are no favorites saved. 
this is used to check if a movie is already in favorites and to display the list of favorites. */


const getRecommendedMovies = () => { /* this function generates a list of recommended movies based on the user's favorites. 
 it looks at the genres of the movies in the favorites list and recommends movies that share those genres. if there are no favorites, it returns a random list of movies. */
  
 const favorites = getFavorites(); // get current favorites list from local storage.

  if (favorites.length === 0) {
    return [...movies].sort(() => 0.5 - Math.random()); 
  } /* if there are no favorites, it returns a random list of movies. this is done by creating a copy of the movies array and sorting it randomly. 
  this ensures that the user sees a different order of movies each time they visit the site or clear their favorites. */

 
  const favoriteGenres = movies // this starts with the movies array which contains all the movie objects.
    .filter(movie => favorites.includes(movie.id)) // this filters the movies array to only include movies that are in the favorites list. 
    // it checks if the movie id is included in the favorites array.
    .flatMap(movie => movie.genre.split(",").map(g => g.trim())); // this creates an array of genres from the favorite movies.
    //  it splits the genre string by comma and trims any extra whitespace.

  // Recommend movies that share ANY genre
  const recommended = movies.filter(movie => {
    const movieGenres = movie.genre.split(",").map(g => g.trim());

    return movieGenres.some(g => favoriteGenres.includes(g)) &&
           !favorites.includes(movie.id);
  });

  return recommended.length > 0 // if there are recommended movies based on favorites, return those in random order. if not, return a random list of all movies.
  ? recommended.sort(() => 0.5 - Math.random()) // this sorts the recommended movies randomly.
  : [...movies].sort(() => 0.5 - Math.random()); // fallback to random order of all movies if no recommendations based on favorites. this ensures that the user always sees a varied selection of movies,
  //  even if their favorites don't have clear genre matches.
};

/* =======================
   LOAD TRAILERS
======================= */


const loadAllTrailers = (searchQuery = "") => {
  videoContainer.innerHTML = "";

  const moviesToShow = getRecommendedMovies().filter(movie =>
    movie.title.toLowerCase().includes(searchQuery.toLowerCase())
  );

  moviesToShow.forEach(movie => {
    movie.trailers.forEach(src => {

      const wrapper = document.createElement("div");
      wrapper.className = "video-wrapper";

      const video = document.createElement("video");
      video.src = src;
      video.controls = true;
      video.dataset.movieId = movie.id;

      video.addEventListener("play", () => {
        activeMovieId = movie.id;
        updateButtonStates();
      });

      const vignette = document.createElement("div");
      vignette.className = "vignette";

      const title = document.createElement("div");
      title.className = "movie-title";
      title.textContent = movie.title;

      wrapper.append(video, vignette, title);
      videoContainer.appendChild(wrapper);
    });
  });
};

/* =======================
   CENTERED AUTOPLAY
======================= */

const playCenteredVideo = () => {
  const videos = document.querySelectorAll("video");

  let closest = null;
  let closestDistance = Infinity;
  const center = window.innerHeight / 2;

  videos.forEach(video => {
    const rect = video.getBoundingClientRect();
    const videoCenter = rect.top + rect.height / 2;
    const distance = Math.abs(center - videoCenter);

    if (distance < closestDistance) {
      closestDistance = distance;
      closest = video;
    }
  });

  videos.forEach(video => {
    if (video === closest) {
      if (video.paused) video.play();
    } else {
      video.pause();
    }
  });
};

videoContainer.addEventListener("scroll", playCenteredVideo);

/* =======================
   SEARCH
======================= */

searchBtn.addEventListener("click", () => {
  searchInput.classList.toggle("active");
  searchInput.focus();
});

searchInput.addEventListener("input", e => {
  loadAllTrailers(e.target.value);
  setTimeout(playCenteredVideo, 200);
});

/* =======================
   LOCAL STORAGE HELPERS
======================= */

const getFromLocalStorage = key =>
  JSON.parse(localStorage.getItem(key)) || [];

const saveToLocalStorage = (key, value) => {
  const data = getFromLocalStorage(key);
  if (!data.includes(value)) {
    data.push(value);
    localStorage.setItem(key, JSON.stringify(data));
  }
};

const removeFromLocalStorage = (key, value) => {
  const data = getFromLocalStorage(key).filter(v => v !== value);
  localStorage.setItem(key, JSON.stringify(data));
};

/* =======================
   BUTTON STATES
======================= */

const updateButtonStates = () => {
  if (!activeMovieId) return;

  favoritesBtn.classList.toggle(
    "active",
    getFromLocalStorage("favorites").includes(activeMovieId)
  );

  watchedBtn.classList.toggle(
    "active",
    getFromLocalStorage("watched").includes(activeMovieId)
  );
};

/* =======================
   BUTTON ACTIONS
======================= */

favoritesBtn.onclick = () => {
  if (!activeMovieId) return;
  const favs = getFromLocalStorage("favorites");
  favs.includes(activeMovieId)
    ? removeFromLocalStorage("favorites", activeMovieId)
    : saveToLocalStorage("favorites", activeMovieId);
  updateButtonStates();
};

watchedBtn.onclick = () => {
  if (!activeMovieId) return;
  const list = getFromLocalStorage("watched");
  list.includes(activeMovieId)
    ? removeFromLocalStorage("watched", activeMovieId)
    : saveToLocalStorage("watched", activeMovieId);
  updateButtonStates();
};

descriptionBtn.onclick = () => {
  if (!activeMovieId) return;
  const movie = movies.find(m => m.id === activeMovieId);
  descriptionBox.innerHTML = movie.description.replace(/\n/g, "<br>");
  descriptionBox.classList.toggle("show");
  whereToWatchBox.classList.remove("show");
};

whereToWatchBtn.onclick = () => {
  if (!activeMovieId) return;
  const movie = movies.find(m => m.id === activeMovieId);
  whereToWatchBox.innerHTML = movie.whereToWatch;
  whereToWatchBox.classList.toggle("show");
  descriptionBox.classList.remove("show");
};

/* =======================
   INITIAL LOAD
======================= */

setTimeout(() => {
  loadAllTrailers();
  playCenteredVideo();
}, 500);



/* =======================
   SHOW LISTS
======================= */

myListBtn.addEventListener("click", () => {
  const favorites = getFromLocalStorage("favorites");
  const watched = getFromLocalStorage("watched");

  listBox.innerHTML = ""; // clear old content

  // === Favorites Section ===
  const favTitle = document.createElement("h2");
  favTitle.textContent = "Favorites";
  listBox.appendChild(favTitle);

  if (favorites.length === 0) {
    listBox.innerHTML += "<p>No favorites yet.</p>";
  } else {
    const favList = document.createElement("ul");
    favorites.forEach(id => {
      const movie = movies.find(m => m.id === id);
      const li = document.createElement("li");
      li.textContent = movie ? movie.title : id;
      favList.appendChild(li);
    });
    listBox.appendChild(favList);
  }

  // === Watched Section ===
  const watchedTitle = document.createElement("h2");
  watchedTitle.textContent = "To Be Watched";
  listBox.appendChild(watchedTitle);

  if (watched.length === 0) {
    listBox.innerHTML += "<p>No saved movies yet.</p>";
  } else {
    const watchedList = document.createElement("ul");
    watched.forEach(id => {
      const movie = movies.find(m => m.id === id);
      const li = document.createElement("li");
      li.textContent = movie ? movie.title : id;
      watchedList.appendChild(li);
    });
    listBox.appendChild(watchedList);
  }

  // show panel
  listBox.classList.toggle("show");

  // close others
  descriptionBox.classList.remove("show");
  whereToWatchBox.classList.remove("show");
});


/* =======================
   CLICK OUTSIDE CLOSE
======================= */

document.addEventListener("pointerdown", (event) => {

  const clickedInsideList = listBox.contains(event.target); // checks if the click was inside the list box. if it was, we don't want to close the dropdown.
  const clickedInsideDescription = descriptionBox.contains(event.target); // checks if the click was inside the description box. if it was, we don't want to close the dropdown.
  const clickedInsideWhere = whereToWatchBox.contains(event.target); 
  const clickedButton = event.target.closest(".buttons button"); // same but for buttons. if click on button then no close.

  if (!clickedInsideList && !clickedInsideDescription && !clickedInsideWhere && !clickedButton) {
  listBox.classList.remove("show");
  descriptionBox.classList.remove("show");
  whereToWatchBox.classList.remove("show");
}
});

</script>



<style>
  
/* =======================
   GLOBAL CINEMATIC THEME
======================= */
body {
  margin: 0;
  background: radial-gradient(circle at center, #0d0d0d 0%, #000 100%);
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  color: white;
}

/* 🎞️ FILM GRAIN */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: url("https://www.transparenttextures.com/patterns/asfalt-light.png");
  opacity: 0.08;
  z-index: 9999;
}

/* =======================
   VIDEO FEED
======================= */
#videoContainer {
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
}

/* each video */
.video-wrapper {
  position: relative;
  height: 100vh;
  width: 100%;
  scroll-snap-align: start;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
}

/* 🎬 LETTERBOX (cinema bars) */
.video-wrapper::before,
.video-wrapper::after {
  content: "";
  position: absolute;
  left: 0;
  width: 100%;
  height: 12%;
  background: #000;
  z-index: 3;
}

.video-wrapper::before { top: 0; }
.video-wrapper::after { bottom: 0; }

/* 🎞️ VIGNETTE */
.video-wrapper .vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.85));
  pointer-events: none;
  z-index: 2;
}

/* 🎥 VIDEO LOOK */
video {
  width: 100%;
  height: 100%;
  object-fit: cover;

  filter:
    brightness(0.65)
    contrast(1.25)
    saturate(1.2)
    sepia(0.08);

  transition: transform 0.6s ease, filter 0.6s ease, opacity 0.4s ease;
}

/* subtle cinematic motion */
video:playing {
  transform: scale(1.03);
}

/* =======================
   MOVIE TITLE
======================= */
.movie-title {
  position: absolute;
  bottom: 100px;
  left: 60px;

  font-size: 48px;
  font-weight: 800;
  letter-spacing: 4px;

  color: #f5c518;

  text-shadow:
    0 0 10px rgba(0,0,0,0.9),
    0 0 30px rgba(0,0,0,1);

  z-index: 4;
}

/* =======================
   BUTTON BAR
======================= */
.buttons {
  position: fixed;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 15px;
  padding: 8px 18px;
  border-radius: 40px;

  background: rgba(10,10,10,0.7);
  backdrop-filter: blur(25px);

  border: 1px solid rgba(255,255,255,0.08);
  z-index: 9999;
}

.buttons button {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.8);
  padding: 8px 16px;
  font-size: 14px;
  letter-spacing: 1px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.buttons button:hover {
  color: white;
  background: rgba(255,255,255,0.1);
}

.buttons button.active {
  background: linear-gradient(135deg, #e50914, #b20710);
  color: white;
  box-shadow: 0 0 20px rgba(229, 9, 20, 0.8);
}

/* =======================
   DROPDOWNS
======================= */
.dropdown {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%) scale(0.95);
  width: 80%;
  max-width: 1000px;
  max-height: 75vh;
  overflow-y: auto;

  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(25px);
  border-radius: 16px;
  padding: 25px;

  color: #eee;
  font-size: 18px;
  line-height: 1.6;

  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;

  box-shadow: 0 0 50px rgba(0,0,0,0.9);
  border: 1px solid rgba(255,255,255,0.08);
  z-index: 9998;
}

.dropdown.show {
  opacity: 1;
  visibility: visible;
  transform: translateX(-50%) scale(1);
}

/* =======================
   LISTS
======================= */
#listBox h2 {
  margin-top: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  padding-bottom: 6px;
}

#listBox li {
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* =======================
   MOBILE
======================= */
@media (max-width: 600px) {
  .movie-title {
    font-size: 24px;
    left: 20px;
    bottom: 80px;
  }

  .buttons button {
    font-size: 11px;
    padding: 6px 10px;
  }

  .dropdown {
    width: 95%;
    font-size: 14px;
  }
}

#searchBtn {
  font-size: 16px;
}

/* hidden by default */
#searchInput {
  width: 0;
  opacity: 0;
  border: none;
  outline: none;

  background: transparent;
  color: white;

  transition: all 0.3s ease;
}

/* expanded state */
#searchInput.active {
  width: 180px;
